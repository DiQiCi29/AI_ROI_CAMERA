name: zone_monitor_app
description: Camera-based restricted zone monitoring app
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_messaging: ^14.8.0

  # Local Notifications (Đã nâng cấp bản 17 để sửa lỗi Java 8)
  flutter_local_notifications: ^17.1.2

  # State Management
  provider: ^6.1.2

  # Utilities & Media
  shared_preferences: ^2.2.3
  audioplayers: ^5.2.1
  torch_light: ^1.0.0
  video_player: ^2.8.3
  webview_flutter: ^4.4.2
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/